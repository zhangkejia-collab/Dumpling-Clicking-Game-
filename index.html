<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語飲食文化記憶遊戲</title>
    <style>
        :root {
            --primary-color: #d35400; /* 溫暖的食物橘色 */
            --bg-color: #fdf6e3;
            --card-bg: #fff;
            --text-color: #333;
            --success-color: #27ae60;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* 遊戲網格設計 */
        .memory-game {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4x4 網格 */
            gap: 10px;
            perspective: 1000px;
        }

        /* 卡片設計 */
        .memory-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* 保持正方形 */
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .memory-card.flip {
            transform: rotateY(180deg);
        }

        .memory-card.matched .front-face {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

            height: 100%;
            padding: 10px;
